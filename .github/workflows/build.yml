# Workflow build file .tipa chưa ký cho ứng dụng noti
name: Build unsigned .tipa

# Kích hoạt khi: push vào nhánh main, push tag dạng v*, hoặc chạy thủ công
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    # Chạy trên runner macOS
    runs-on: macos-14

    steps:
      # Lấy mã nguồn về runner
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      # Chọn phiên bản Xcode ổn định mới nhất
      - name: Chọn Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      # Cài đặt ldid qua Homebrew (dùng để thêm entitlements)
      - name: Cài đặt ldid
        run: brew install ldid

      # Cấp quyền thực thi cho script build
      - name: Cấp quyền thực thi cho script
        run: chmod +x ipabuild.sh

      # Chạy script build để tạo build/noti.tipa
      - name: Build .tipa
        run: ./ipabuild.sh

      # Tải file .tipa lên artifact của lần chạy
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noti-tipa
          path: build/noti.tipa

      # Khi push tag (refs/tags/*): tạo GitHub Release và đính kèm file .tipa
      - name: Tạo GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/noti.tipa
